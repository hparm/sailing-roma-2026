<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>antibes → roma · sailing voyage</title>
<meta name="description" content="An interactive chart of a 2026 sailing voyage from Antibes to Rome — Portofino, Cinque Terre, Elba and the Tuscan Archipelago." />
<meta property="og:type" content="website" />
<meta property="og:title" content="antibes → roma · sailing voyage" />
<meta property="og:description" content="Interactive chart of a 2026 voyage from Antibes to Rome — Portofino, Cinque Terre, Elba, Tuscan Archipelago." />
<meta property="og:image" content="https://images.unsplash.com/photo-1502209524164-acea936639a2?w=1200&h=630&fit=crop" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="antibes → roma · sailing voyage" />
<meta name="twitter:description" content="Interactive chart of a 2026 voyage from Antibes to Rome." />
<link href="https://unpkg.com/maplibre-gl@5.6.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@5.6.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --bg:#141413; --panel:#1d1d1b; --ink:#e8e6dc; --muted:#8a877c;
    --line:rgba(232,230,220,.12); --coral:#d97757; --coral2:#e5a07f;
    --mono:ui-monospace,"JetBrains Mono","IBM Plex Mono","SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--mono)}
  body{overflow:hidden}
  #app{position:fixed;inset:0;display:flex;flex-direction:column}

  header{flex:0 0 auto;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#161615,#141413);padding:10px 16px;display:flex;align-items:center;gap:14px;z-index:5}
  .dots{display:flex;gap:7px}
  .dots i{width:11px;height:11px;border-radius:50%;display:block;opacity:.85}
  .dots i:nth-child(1){background:#e05c54}.dots i:nth-child(2){background:#e0b341}.dots i:nth-child(3){background:#4fb06d}
  .title{font-size:13px;letter-spacing:.04em}.title b{color:var(--coral);font-weight:600}
  .prompt{color:var(--muted);font-size:13px}
  .prompt .cur{display:inline-block;width:8px;height:15px;background:var(--coral);margin-left:2px;vertical-align:-2px;animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .spacer{flex:1}
  .stats{display:flex;gap:18px;color:var(--muted);font-size:12px}
  .stats b{color:var(--ink);font-weight:600}.stats .k{color:var(--coral2)}
  .share{font-family:var(--mono);font-size:12px;color:var(--ink);background:transparent;border:1px solid var(--line);border-radius:6px;padding:6px 12px;cursor:pointer;transition:.15s;text-decoration:none;display:inline-flex;align-items:center;white-space:nowrap}
  .share:hover{border-color:var(--coral);color:var(--coral2)}
  .hdr-actions{display:flex;gap:8px}

  #map{flex:1;position:relative;background:var(--bg)}
  .maplibregl-ctrl-attrib{font-family:var(--mono);font-size:9px}
  canvas{outline:none}

  .mk{cursor:pointer;display:flex;flex-direction:column;align-items:center;transition:transform .18s ease}
  .mk:hover{transform:translateY(-3px) scale(1.07);z-index:99}
  .mk .ring{width:46px;height:46px;border-radius:50%;border:2px solid var(--coral);background:#0e0e0d center/cover no-repeat;display:flex;align-items:center;justify-content:center;color:var(--ink);font-size:14px;font-weight:600;overflow:hidden;box-shadow:0 0 0 4px rgba(217,119,87,.10),0 4px 14px rgba(0,0,0,.55)}
  .mk.end .ring{border-color:var(--coral2);box-shadow:0 0 0 4px rgba(229,160,127,.20),0 4px 14px rgba(0,0,0,.6)}
  .mk .lbl{margin-top:6px;text-align:center;font-size:10px;letter-spacing:.02em;color:var(--ink);background:rgba(20,20,19,.82);border:1px solid var(--line);border-radius:5px;padding:2px 7px;white-space:nowrap}

  /* leg hover tooltip */
  .maplibregl-popup.leg .maplibregl-popup-content{background:#1d1d1b;border:1px solid var(--coral);border-radius:8px;color:var(--ink);font-family:var(--mono);font-size:11.5px;padding:8px 11px;box-shadow:0 6px 20px rgba(0,0,0,.5)}
  .maplibregl-popup.leg .maplibregl-popup-tip{display:none}
  .leg .r1{color:var(--coral2);font-weight:600;margin-bottom:3px}
  .leg .r2{color:var(--ink)} .leg .r2 b{color:var(--coral)}

  #panel{position:absolute;top:0;right:0;height:100%;width:372px;max-width:90vw;z-index:6;background:linear-gradient(180deg,#1d1d1b,#171716);border-left:1px solid var(--line);transform:translateX(105%);transition:transform .32s cubic-bezier(.2,.7,.2,1);display:flex;flex-direction:column;padding:22px 22px 26px;overflow:auto}
  #panel.open{transform:translateX(0)}
  #panel .x{position:absolute;top:12px;right:14px;color:#fff;background:var(--coral);border:none;border-radius:50%;width:30px;height:30px;font-family:var(--mono);font-size:15px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(217,119,87,.45);transition:.15s;z-index:2}
  #panel .x:hover{background:var(--coral2);transform:scale(1.08)}
  #panel .hero{width:100%;height:150px;border-radius:10px;background:#0e0e0d center/cover no-repeat;border:1px solid var(--line);margin-bottom:14px}
  #panel .idx{color:var(--coral);font-size:12px;letter-spacing:.12em}
  #panel h2{margin:4px 0 2px;font-size:22px;font-weight:600}
  #panel .zone{color:var(--muted);font-size:12px;margin-bottom:16px}
  .meta{display:grid;grid-template-columns:auto 1fr;gap:7px 14px;font-size:12.5px;margin-bottom:14px}
  .meta .lab{color:var(--coral2)}.meta .val{color:var(--ink)}
  .pill{display:inline-block;font-size:11px;border:1px solid var(--line);border-radius:5px;padding:2px 8px;color:var(--muted)}
  .sect{border-top:1px solid var(--line);padding-top:12px;margin-bottom:12px}
  .sect h3{margin:0 0 5px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--coral2)}
  .sect p{margin:0;font-size:12.5px;line-height:1.5;color:#d4d2c8}
  .blurb{font-size:13px;line-height:1.55;color:#d4d2c8;border-top:1px solid var(--line);padding-top:12px;margin-bottom:16px}
  .links{display:flex;flex-direction:column;gap:8px}
  .links a{display:flex;justify-content:space-between;align-items:center;text-decoration:none;font-size:12.5px;color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:9px 12px;transition:.15s}
  .links a:hover{border-color:var(--coral);color:var(--coral2)}.links a .arr{color:var(--coral)}

  .ctrls{position:absolute;left:16px;top:16px;z-index:4;display:flex;gap:8px}
  .ctrls button{font-family:var(--mono);font-size:12px;color:var(--ink);background:rgba(20,20,19,.8);border:1px solid var(--line);border-radius:7px;padding:7px 12px;cursor:pointer;backdrop-filter:blur(6px);transition:.15s}
  .ctrls button:hover{border-color:var(--coral);color:var(--coral2)}
  .hint{position:absolute;left:16px;top:52px;z-index:4;color:var(--muted);font-size:11px;background:rgba(20,20,19,.7);padding:4px 8px;border-radius:6px}
  .toast{position:absolute;left:50%;bottom:26px;transform:translateX(-50%);z-index:20;background:#222;border:1px solid var(--coral);color:var(--ink);font-size:12px;padding:8px 14px;border-radius:8px;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}
  .sync{font-size:11px;color:var(--muted)}.sync b{color:#4fb06d}
  @media(max-width:640px){.stats{display:none}.title{font-size:12px}#panel{width:100%}}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="dots"><i></i><i></i><i></i></div>
    <div class="title"><b>antibes → roma</b> · sailing voyage 2026</div>
    <div class="prompt">&gt; plotting course<span class="cur"></span></div>
    <div class="spacer"></div>
    <div class="stats">
      <div><span class="k">stops</span> <b id="s-stops">—</b></div>
      <div><span class="k">distance</span> <b id="s-nm">—</b> nm</div>
      <div><span class="k">dates</span> <b>20 jul–2 aug</b></div>
      <div class="sync" id="sync">· local data</div>
    </div>
    <div class="hdr-actions">
      <a class="share" href="https://docs.google.com/spreadsheets/d/1Dna54ZwmSTP0sJUdmk4s0W8ITo6zE_s3CYSrxFbZ9Zk/edit?usp=sharing" target="_blank" rel="noopener" title="Open the full itinerary spreadsheet">itinerary ↗</a>
      <button class="share" id="shareBtn">share ↗</button>
    </div>
  </header>

  <div id="map">
    <div class="ctrls"><button id="fitBtn">⤢ fit route</button></div>
    <div class="hint">tap a stop for details · hover a leg for distance &amp; time</div>
    <aside id="panel">
      <button class="x" id="panelX">✕</button>
      <div class="hero" id="p-hero"></div>
      <div class="idx" id="p-idx"></div>
      <h2 id="p-name"></h2>
      <div class="zone" id="p-zone"></div>
      <div class="meta" id="p-meta"></div>
      <div id="p-ports"></div>
      <div class="blurb" id="p-blurb"></div>
      <div class="links" id="p-links"></div>
    </aside>
    <div class="toast" id="toast">link copied</div>
  </div>
</div>

<script>
const SHEET_ID="1Dna54ZwmSTP0sJUdmk4s0W8ITo6zE_s3CYSrxFbZ9Zk";
const SHEET_URL="https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/edit?usp=sharing";
const CSV_URL="https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:csv&sheet=Itinerary";
const SPEED=5; // kts, planning speed

const STOPS=[
 {n:"Antibes", zone:"Côte d'Azur · France", ll:[7.128,43.581], date:"Mon 20 Jul · depart", night:"start", type:"Departure", nights:null,
   wiki:["Antibes"], harbour:"Port Vauban (home berth)", anchor:"",
   blurb:"Home port. Slip the lines on the 20th and head south-east along the Riviera."},
 {n:"Sanremo", zone:"Liguria · Riviera di Ponente", ll:[7.776,43.815], date:"Mon 20 Jul", night:"marina", type:"Harbour", nights:1,
   wiki:["Sanremo"], harbour:"Marina di Sanremo (Portosole); Porto Vecchio", anchor:"Limited & exposed — better to berth",
   blurb:"Clear into Italy at Portosole. Old town La Pigna, an aperitivo, and the casino if the night runs late."},
 {n:"Portofino / Paraggi", zone:"Liguria · Gulf of Tigullio", ll:[9.210,44.306], date:"Tue 21 – Wed 22 Jul", night:"marina", type:"Pretty town", nights:2,
   wiki:["Portofino"], harbour:"Portofino harbour (very pricey, ~€1,500+); Santa Margherita Ligure & Rapallo (better value)", anchor:"Mooring buoys at Baia di Paraggi & San Fruttuoso",
   blurb:"The iconic harbour plus San Fruttuoso abbey, reachable only by sea. Camogli next door. Nightlife at Covo di Nord-Est."},
 {n:"Portovenere", zone:"Liguria · Gulf of Poets", ll:[9.838,44.052], date:"Thu 23 – Fri 24 Jul", night:"anchor", type:"Wild", nights:2,
   wiki:["Porto Venere","Portovenere"], harbour:"Portovenere marina (few transit berths); Porto Mirabello, La Spezia", anchor:"Rada del Terrizzo & Le Grazie, off Palmaria island",
   blurb:"The beautiful gateway to the Cinque Terre and your base for them — ferry or train the five villages (no anchoring in front of them)."},
 {n:"Capraia", zone:"Tuscan Archipelago", ll:[9.844,43.050], date:"Sat 25 Jul", night:"anchor", type:"Wild", nights:1,
   wiki:["Capraia Isola","Capraia"], harbour:"Porto di Capraia (small — book ahead in July)", anchor:"Cala Rossa, in settled weather",
   blurb:"Wild, car-light national-park island. Clear-water swimming and diving; it also breaks the crossing to Elba."},
 {n:"Portoferraio (Elba)", zone:"Elba · Tuscan Archipelago", ll:[10.323,42.813], date:"Sun 26 – Mon 27 Jul", night:"marina", type:"Core stop", nights:2,
   wiki:["Portoferraio"], harbour:"Darsena Medicea & Portoferraio marinas", anchor:"Bay of Portoferraio; day anchor at Fetovaia, Cavoli, Sant'Andrea",
   blurb:"The core of the trip. Base here and day-cruise the west-coast beaches. Dinner at Le Viste / Calanova; Molo G after."},
 {n:"Porto Azzurro (Elba)", zone:"Elba · Tuscan Archipelago", ll:[10.398,42.766], date:"Tue 28 Jul", night:"marina", type:"Mixed", nights:1,
   wiki:["Porto Azzurro"], harbour:"Porto Azzurro marina; Marina di Campo", anchor:"Baia di Barbarossa",
   blurb:"Round to the south-east coast for a relaxed town night — and to pre-position for the run down to Giglio."},
 {n:"Giglio", zone:"Tuscan Archipelago", ll:[10.906,42.364], date:"Wed 29 Jul", night:"anchor", type:"Pretty village", nights:1,
   wiki:["Isola del Giglio","Giglio Island"], harbour:"Giglio Porto", anchor:"Campese bay (NW); Cala dell'Allume",
   blurb:"Colourful fishing village with a hilltop castle and clear water. Optional half-day at Giannutri for Roman ruins and sea caves."},
 {n:"Ostia (Roma)", zone:"Lazio · Rome", ll:[12.230,41.733], date:"Thu 30 Jul · arrive", night:"finish", type:"Finish", nights:3,
   wiki:["Lido di Ostia","Ostia (Rome)","Ostia Antica"], harbour:"Porto Turistico di Roma (Ostia); Riva di Traiano (alt.)", anchor:"",
   blurb:"Journey's end. A Rome weekend (train ~35 min), then cast off on Sunday 2 Aug."}
];
const gmapsUrl=s=>"https://www.google.com/maps/search/?api=1&query="+s.ll[1]+","+s.ll[0];
document.getElementById("s-stops").textContent=STOPS.length;

// haversine (NM) between [lng,lat]
function nm(a,b){const R=3440.065,r=Math.PI/180,dLa=(b[1]-a[1])*r,dLo=(b[0]-a[0])*r;
  const h=Math.sin(dLa/2)**2+Math.cos(a[1]*r)*Math.cos(b[1]*r)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));}
const routeCoords=STOPS.map(s=>s.ll);
let totalNM=0;
const legFeatures=[];
for(let i=0;i<STOPS.length-1;i++){
  const d=nm(STOPS[i].ll,STOPS[i+1].ll); totalNM+=d;
  legFeatures.push({type:"Feature",id:i,properties:{
    from:STOPS[i].n.replace(/\s*\(.*\)/,""), to:STOPS[i+1].n.replace(/\s*\(.*\)/,""),
    dist:Math.round(d), hrs:(d/SPEED).toFixed(1)
  },geometry:{type:"LineString",coordinates:[STOPS[i].ll,STOPS[i+1].ll]}});
}
document.getElementById("s-nm").textContent="~"+Math.round(totalNM);

const map=new maplibregl.Map({container:"map",style:"https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",center:[10.0,43.4],zoom:5.4,attributionControl:{compact:true}});
map.addControl(new maplibregl.NavigationControl({showCompass:false}),"bottom-right");
const reduce=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const bounds=routeCoords.reduce((b,c)=>b.extend(c),new maplibregl.LngLatBounds(routeCoords[0],routeCoords[0]));

map.on("load",()=>{
  try{ map.setProjection({type:"globe"}); }catch(e){}
  map.addSource("route",{type:"geojson",data:{type:"FeatureCollection",features:legFeatures}});
  // static edges (no animation)
  map.addLayer({id:"route-glow",type:"line",source:"route",layout:{"line-cap":"round"},paint:{"line-color":"#d97757","line-width":6,"line-opacity":.10,"line-blur":3}});
  map.addLayer({id:"route",type:"line",source:"route",layout:{"line-cap":"round"},
    paint:{"line-color":"#d97757","line-dasharray":[2.2,2.2],
      "line-width":["case",["boolean",["feature-state","hover"],false],4,2],
      "line-opacity":["case",["boolean",["feature-state","hover"],false],1,.75]}});

  // hover overlay with distance + time
  const legPopup=new maplibregl.Popup({className:"leg",closeButton:false,closeOnClick:false,offset:12});
  let hoverId=null;
  map.on("mousemove","route",e=>{
    map.getCanvas().style.cursor="pointer";
    const f=e.features[0];
    if(hoverId!==null) map.setFeatureState({source:"route",id:hoverId},{hover:false});
    hoverId=f.id; map.setFeatureState({source:"route",id:hoverId},{hover:true});
    const p=f.properties;
    legPopup.setLngLat(e.lngLat).setHTML(
      `<div class="r1">${p.from} → ${p.to}</div><div class="r2"><b>${p.dist} NM</b> · ~${p.hrs} h @ ${SPEED} kt</div>`
    ).addTo(map);
  });
  map.on("mouseleave","route",()=>{
    map.getCanvas().style.cursor="";
    if(hoverId!==null) map.setFeatureState({source:"route",id:hoverId},{hover:false});
    hoverId=null; legPopup.remove();
  });

  STOPS.forEach((s,i)=>{
    const el=document.createElement("div"); el.className="mk"+(i===0||i===STOPS.length-1?" end":"");
    const ring=document.createElement("div"); ring.className="ring"; ring.textContent=(i+1);
    const lbl=document.createElement("div"); lbl.className="lbl"; lbl.textContent=s.n.replace(/\s*\(.*\)/,"");
    el.appendChild(ring); el.appendChild(lbl); s._ring=ring;
    el.tabIndex=0; el.setAttribute("role","button"); el.setAttribute("aria-label",s.n+" — details");
    el.addEventListener("click",()=>openStop(i));
    el.addEventListener("keydown",ev=>{if(ev.key==="Enter"||ev.key===" "){ev.preventDefault();openStop(i);}});
    new maplibregl.Marker({element:el,anchor:"top"}).setLngLat(s.ll).addTo(map);
    loadThumb(s);
  });

  fitRoute();
  if(!reduce) setTimeout(()=>{map.easeTo({center:[10.0,43.4],zoom:5.6,duration:2200});},300);
  enrichFromSheet();
});

async function loadThumb(s){
  for(const title of s.wiki){
    try{
      const r=await fetch("https://en.wikipedia.org/api/rest_v1/page/summary/"+encodeURIComponent(title));
      if(!r.ok) continue; const j=await r.json();
      const small=j.thumbnail&&j.thumbnail.source, big=(j.originalimage&&j.originalimage.source)||small;
      if(small){ s.img=small; s.imgBig=big; if(s._ring){s._ring.style.backgroundImage="url('"+small+"')";s._ring.textContent="";} return; }
    }catch(e){}
  }
}

const panel=document.getElementById("panel");
function openStop(i){
  const s=STOPS[i];
  document.getElementById("p-hero").style.backgroundImage=s.imgBig?("url('"+s.imgBig+"')"):"none";
  document.getElementById("p-idx").textContent="STOP "+(i+1).toString().padStart(2,"0")+" / "+STOPS.length.toString().padStart(2,"0");
  document.getElementById("p-name").textContent=s.n;
  document.getElementById("p-zone").textContent=s.zone;
  const nightsTxt = s.nights==null ? "home port" : (s.nights+" night"+(s.nights===1?"":"s"));
  const m=document.getElementById("p-meta"); m.innerHTML="";
  [["dates",s.date],["nights",`<span class="pill">${nightsTxt}</span>`],["type",s.type]].forEach(([k,v])=>{
    const a=document.createElement("div");a.className="lab";a.textContent=k;
    const b=document.createElement("div");b.className="val";b.innerHTML=v;m.appendChild(a);m.appendChild(b);});
  let ports="";
  if(s.harbour) ports+=`<div class="sect"><h3>⚓ harbour / marina</h3><p>${s.harbour}</p></div>`;
  if(s.anchor)  ports+=`<div class="sect"><h3>◍ anchoring</h3><p>${s.anchor}</p></div>`;
  document.getElementById("p-ports").innerHTML=ports;
  document.getElementById("p-blurb").textContent=s.blurb;
  document.getElementById("p-links").innerHTML=
    `<a href="${gmapsUrl(s)}" target="_blank" rel="noopener">Open in Google Maps <span class="arr">↗</span></a>`+
    `<a href="${SHEET_URL}" target="_blank" rel="noopener">Full itinerary (spreadsheet) <span class="arr">↗</span></a>`;
  panel.classList.add("open");
  map.flyTo({center:s.ll,zoom:8.2,duration:1600,essential:true});
}
function closePanel(){ panel.classList.remove("open"); }
document.getElementById("panelX").addEventListener("click",(e)=>{e.stopPropagation();closePanel();});
// close by clicking anywhere outside the pane (map, header, controls) — but not on a stop marker
document.addEventListener("click",e=>{
  if(!panel.classList.contains("open")) return;
  if(e.target.closest("#panel")||e.target.closest(".mk")) return;
  closePanel();
});
// close with the Escape key
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closePanel(); });

function fitRoute(){ map.fitBounds(bounds,{padding:{top:90,bottom:90,left:90,right:panel.classList.contains("open")?412:90},duration:reduce?0:1200}); }
document.getElementById("fitBtn").addEventListener("click",()=>{panel.classList.remove("open");fitRoute();});

document.getElementById("shareBtn").addEventListener("click",async()=>{
  const url=location.href,toast=document.getElementById("toast");
  try{ if(navigator.share && /Mobi/.test(navigator.userAgent)){await navigator.share({title:"Antibes → Roma sailing voyage",url});return;} await navigator.clipboard.writeText(url);}catch(e){}
  toast.classList.add("show"); setTimeout(()=>toast.classList.remove("show"),1600);
});

function norm(s){return (s||"").toLowerCase().replace(/[^a-z]/g,"");}
function enrichFromSheet(){
  Papa.parse(CSV_URL,{download:true,header:true,complete:(res)=>{
    try{
      const rows=res.data||[]; if(!rows.length) return; let hits=0;
      STOPS.forEach(s=>{ const key=norm(s.n.split("(")[0]);
        const row=rows.find(r=>{const to=norm(r["To"]||r["to"]||"");return to.includes(key)||(key.length>4&&key.includes(to.slice(0,6)));});
        if(row){ const h=row["Highlights / notes"]||row["Highlights"]||row["Notes"]; const d=row["Date"];
          if(d&&d.trim()) s.date=d.trim(); if(h&&h.trim().length>10) s.blurb=h.trim(); hits++; }});
      if(hits){ document.getElementById("sync").innerHTML="· <b>synced with sheet</b>"; }
    }catch(e){}
  },error:()=>{}});
}
</script>
</body>
</html>
